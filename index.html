<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },

  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #f9fafb;
      font-family: 'Inter', sans-serif;
    }

    #map-container {
      width: 100%;
      height: 100%;
      z-index: 0;
      touch-action: none;
    }

    .ui-layer {
      z-index: 1000;
      position: relative;
      pointer-events: none;
    }

    .ui-content {
      pointer-events: auto;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .custom-pin {
      background: transparent;
      border: none;
    }

    .modal-enter {
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox-image {
      max-width: min(92vw, 1100px);
      max-height: 78vh;
      object-fit: contain;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      background: #111827;
    }

    .map-action-buttons {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .map-action-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease, background 0.16s ease;
    }
    .map-action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.28);
      filter: saturate(1.05);
    }
    .map-action-btn:active {
      transform: translateY(0) scale(0.97);
    }
    .map-action-btn:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 2px;
    }
    .map-action-btn.location {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    .map-action-btn.location:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    }
    .map-action-btn.settings {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
    }
    .map-action-btn.settings:hover {
      background: linear-gradient(135deg, #1f2937 0%, #0f172a 100%);
    }
    .map-action-icon {
      width: 26px;
      height: 26px;
    }
    .map-action-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-top-color: rgba(255, 255, 255, 0.2);
      border-radius: 9999px;
      animation: spin 0.9s linear infinite;
    }
    .lightbox-close-btn {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.96);
      color: #dc2626;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease;
    }
    .lightbox-close-btn:hover {
      transform: translateY(-1px);
      background: #fee2e2;
      color: #b91c1c;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.38);
    }
    .lightbox-close-btn:active {
      transform: translateY(0) scale(0.97);
    }
    .lightbox-close-btn:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 2px;
    }
    .lightbox-close-icon {
      width: 26px;
      height: 26px;
      stroke-width: 3;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (max-width: 640px) {
      .map-action-btn {
        width: 48px;
        height: 48px;
        border-radius: 14px;
      }
      .map-action-icon {
        width: 24px;
        height: 24px;
      }
      .lightbox-close-btn {
        width: 48px;
        height: 48px;
        border-radius: 14px;
      }
      .lightbox-close-icon {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const { createClient } = window.supabase;

    const SUPABASE_URL = 'https://wgwlnutnstrfuiiunlcu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iC7kbinoy61_5eQCnrV25Q_OioA7Y1x';
    const APP_STATE_ID = 'main';
    const CACHE_KEY = 'hm_signs_cache_v4';
    const IMAGE_BUCKET = 'marker-images';

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const Icons = {
      MapPin: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      ),
      Camera: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
          <circle cx="12" cy="13" r="4" />
        </svg>
      ),
      Send: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      ),
      X: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      ),
      Clock: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      ),
      Settings: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      ),
      Trash: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      ),
      Download: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      ),
      Upload: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      ),
      Check: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      ),
      Locate: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
          <path d="M12.8 2.4L18.9 18.2c0.18 0.47-0.28 0.94-0.76 0.77l-5.17-1.84a1 1 0 0 0-0.67 0L7.14 19c-0.48 0.17-0.94-0.3-0.76-0.77L12.49 2.4c0.06-0.17 0.25-0.17 0.31 0Z" />
          <path d="M12 6.2L15.26 14.6L12 13.45L8.74 14.6L12 6.2Z" fill="rgba(255,255,255,0.28)" />
        </svg>
      ),
      ZoomIn: (p) => (
        <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      ),
    };

    function normalizeMarkers(input) {
      if (!Array.isArray(input)) return [];
      return input.map((m) => ({
        ...m,
        history: Array.isArray(m.history) ? m.history : [],
      }));
    }

    function MainApp() {
      const [markers, setMarkers] = useState([]);
      const [selectedLocation, setSelectedLocation] = useState(null);
      const [isAddingMode, setIsAddingMode] = useState(false);
      const [tempCoords, setTempCoords] = useState(null);
      const [comment, setComment] = useState('');
      const [selectedImage, setSelectedImage] = useState(null);
      const [selectedFile, setSelectedFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [importText, setImportText] = useState('');
      const [copySuccess, setCopySuccess] = useState(false);
      const [syncMessage, setSyncMessage] = useState('Loading...');

      const [myLocation, setMyLocation] = useState(null);
      const [locationError, setLocationError] = useState('');
      const [isLocating, setIsLocating] = useState(false);

      const [lightboxImage, setLightboxImage] = useState(null);
      const [lightboxCaption, setLightboxCaption] = useState('');
      const [lightboxDate, setLightboxDate] = useState('');

      const [showPanel, setShowPanel] = useState(false);
      const [draftState, setDraftState] = useState(null);

      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersLayerRef = useRef(null);
      const tempMarkerRef = useRef(null);

      const myLocationMarkerRef = useRef(null);
      const myAccuracyCircleRef = useRef(null);
      const locationWatchIdRef = useRef(null);
      const centerOnNextLocationRef = useRef(false);

      function openLightbox(imageUrl, caption = '', dateText = '') {
        if (!imageUrl) return;
        setLightboxImage(imageUrl);
        setLightboxCaption(caption || '');
        setLightboxDate(dateText || '');
      }

      function closeLightbox() {
        setLightboxImage(null);
        setLightboxCaption('');
        setLightboxDate('');
      }

      function clearComposer() {
        setIsAddingMode(false);
        setTempCoords(null);
        setComment('');
        setSelectedImage(null);
        setSelectedFile(null);
      }

      function hasUnsavedDraft() {
        return !!(tempCoords || comment || selectedImage || selectedFile);
      }

      function stashCurrentDraft() {
        if (!hasUnsavedDraft()) return false;
        setDraftState({
          tempCoords,
          comment,
          selectedImage,
          selectedFile,
        });
        return true;
      }

      function restoreDraft() {
        if (!draftState) return;
        setSelectedLocation(null);
        setTempCoords(draftState.tempCoords || null);
        setComment(draftState.comment || '');
        setSelectedImage(draftState.selectedImage || null);
        setSelectedFile(draftState.selectedFile || null);
        setIsAddingMode(true);
        setShowPanel(true);
        setDraftState(null);
      }

      function handleBackToMap() {
        if (isAddingMode) {
          stashCurrentDraft();
          clearComposer();
        }
        setShowPanel(false);
      }

      function handleClosePanel() {
        setSelectedLocation(null);
        setShowPanel(false);
        clearComposer();
      }

      function openPinPanel(markerData) {
        if (hasUnsavedDraft()) {
          stashCurrentDraft();
          clearComposer();
        }
        setSelectedLocation(markerData);
        setShowPanel(true);
      }

      useEffect(() => {
        function onKeyDown(e) {
          if (e.key === 'Escape') {
            closeLightbox();
          }
        }
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, []);

      async function saveSharedData(nextMarkers) {
        const normalized = normalizeMarkers(nextMarkers);
        localStorage.setItem(CACHE_KEY, JSON.stringify(normalized));
        setSyncMessage('Saving...');

        const { error } = await sb
          .from('app_state')
          .upsert({
            id: APP_STATE_ID,
            data: normalized,
            updated_at: new Date().toISOString(),
          });

        if (error) {
          console.error('Failed to save shared data:', error);
          setSyncMessage('Save failed (local backup only)');
          return false;
        }

        setSyncMessage('Synced');
        return true;
      }

      async function uploadImageToStorage(file) {
        if (!file) return null;

        const ext = file.name?.split('.').pop()?.toLowerCase() || 'jpg';
        const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
        const filePath = `pins/${fileName}`;

        const { error } = await sb.storage.from(IMAGE_BUCKET).upload(filePath, file, {
          cacheControl: '3600',
          upsert: false,
          contentType: file.type || 'image/jpeg',
        });

        if (error) {
          console.error('Failed to upload image:', error);
          alert('Image upload failed: ' + error.message);
          return null;
        }

        const { data } = sb.storage.from(IMAGE_BUCKET).getPublicUrl(filePath);
        return data.publicUrl;
      }

      function extractStoragePathFromUrl(url) {
        if (!url) return null;
        const marker = `/storage/v1/object/public/${IMAGE_BUCKET}/`;
        const idx = url.indexOf(marker);
        if (idx === -1) return null;
        return decodeURIComponent(url.slice(idx + marker.length));
      }

      function getLocationErrorMessage(error) {
        switch (error.code) {
          case 1:
            return 'Location access was denied. Please allow location permission in your browser or device settings.';
          case 2:
            return 'Current location is unavailable.';
          case 3:
            return 'Location request timed out. Please try again.';
          default:
            return 'Unable to get your location.';
        }
      }

      function updateMyLocation(position) {
        const { latitude, longitude, accuracy } = position.coords;
        const latlng = [latitude, longitude];

        setMyLocation({ lat: latitude, lng: longitude, accuracy });
        setLocationError('');
        setIsLocating(false);

        if (!mapInstanceRef.current) return;

        if (!myLocationMarkerRef.current) {
          const userIcon = L.divIcon({
            className: 'custom-pin',
            html: `
              <div style="position:relative;width:18px;height:18px;">
                <div style="position:absolute;inset:-6px;background:rgba(59,130,246,0.22);border-radius:9999px;"></div>
                <div style="position:absolute;inset:0;background:#2563eb;border:3px solid #ffffff;border-radius:9999px;box-shadow:0 2px 8px rgba(0,0,0,0.25);"></div>
              </div>
            `,
            iconSize: [18, 18],
            iconAnchor: [9, 9],
          });

          myLocationMarkerRef.current = L.marker(latlng, {
            icon: userIcon,
            interactive: false,
            keyboard: false,
          }).addTo(mapInstanceRef.current);
        } else {
          myLocationMarkerRef.current.setLatLng(latlng);
        }

        if (!myAccuracyCircleRef.current) {
          myAccuracyCircleRef.current = L.circle(latlng, {
            radius: accuracy || 0,
            color: '#2563eb',
            weight: 1,
            fillColor: '#60a5fa',
            fillOpacity: 0.12,
            interactive: false,
          }).addTo(mapInstanceRef.current);
        } else {
          myAccuracyCircleRef.current.setLatLng(latlng);
          myAccuracyCircleRef.current.setRadius(accuracy || 0);
        }

        if (centerOnNextLocationRef.current) {
          const nextZoom = Math.max(mapInstanceRef.current.getZoom(), 16);
          mapInstanceRef.current.setView(latlng, nextZoom);
          centerOnNextLocationRef.current = false;
        }
      }

      function handleLocationError(error) {
        console.error('Location error:', error);
        setIsLocating(false);
        setLocationError(getLocationErrorMessage(error));
        centerOnNextLocationRef.current = false;
      }

      function handleLocateMe() {
        if (!navigator.geolocation) {
          setLocationError('This browser does not support geolocation.');
          return;
        }

        setIsLocating(true);
        setLocationError('');
        centerOnNextLocationRef.current = true;

        const options = {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0,
        };

        navigator.geolocation.getCurrentPosition(updateMyLocation, handleLocationError, options);

        if (locationWatchIdRef.current == null) {
          locationWatchIdRef.current = navigator.geolocation.watchPosition(
            updateMyLocation,
            handleLocationError,
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
          );
        }
      }

      useEffect(() => {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          try {
            setMarkers(normalizeMarkers(JSON.parse(cached)));
          } catch (e) {
            console.error('Failed to parse cached data:', e);
          }
        }

        async function loadSharedData() {
          setSyncMessage('Loading from Supabase...');
          const { data, error } = await sb
            .from('app_state')
            .select('data')
            .eq('id', APP_STATE_ID)
            .limit(1);

          if (error) {
            console.error('Failed to load shared data:', error);
            setSyncMessage('Remote load failed (using local cache)');
            return;
          }

          const remoteMarkers = data && data.length > 0 ? normalizeMarkers(data[0].data) : [];
          setMarkers(remoteMarkers);
          localStorage.setItem(CACHE_KEY, JSON.stringify(remoteMarkers));
          setSyncMessage('Load complete');
        }

        loadSharedData();
      }, []);

      useEffect(() => {
        if (!mapInstanceRef.current && mapRef.current) {
          const map = L.map(mapRef.current, { zoomControl: false }).setView([-36.8485, 174.7633], 13);

          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OSM © CARTO',
          }).addTo(map);

          markersLayerRef.current = L.layerGroup().addTo(map);
          mapInstanceRef.current = map;

          map.on('click', (e) => handleMapClick(e.latlng));
        }
      }, []);

      useEffect(() => {
        if (!mapInstanceRef.current || !markersLayerRef.current) return;

        markersLayerRef.current.clearLayers();

        markers.forEach((markerData) => {
          if (markerData.lat == null || markerData.lng == null) return;

          const imageHtml = markerData.latestImage
            ? `<img src="${markerData.latestImage}" class="w-full h-full object-cover" />`
            : `<div class="w-3 h-3 bg-white rounded-full"></div>`;

          const iconHtml = `
            <div class="relative transition-transform hover:scale-110 cursor-pointer">
              <div class="w-10 h-10 rounded-full border-2 border-white shadow-lg overflow-hidden bg-blue-500 flex items-center justify-center">
                ${imageHtml}
              </div>
              <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-white"></div>
            </div>
          `;

          const customIcon = L.divIcon({
            className: 'custom-pin',
            html: iconHtml,
            iconSize: [40, 50],
            iconAnchor: [20, 50],
          });

          const marker = L.marker([markerData.lat, markerData.lng], { icon: customIcon })
            .on('click', (e) => {
              L.DomEvent.stopPropagation(e);
              setTimeout(() => {
                openPinPanel(markerData);
                if (tempMarkerRef.current) {
                  tempMarkerRef.current.remove();
                  tempMarkerRef.current = null;
                }
              }, 10);
            });

          markersLayerRef.current.addLayer(marker);
        });
      }, [markers, tempCoords, comment, selectedImage, selectedFile]);

      useEffect(() => {
        if (!mapInstanceRef.current) return;

        if (tempCoords) {
          if (tempMarkerRef.current) tempMarkerRef.current.remove();
          tempMarkerRef.current = L.marker([tempCoords.lat, tempCoords.lng], { opacity: 0.6 }).addTo(mapInstanceRef.current);
        } else if (tempMarkerRef.current) {
          tempMarkerRef.current.remove();
          tempMarkerRef.current = null;
        }
      }, [tempCoords]);

      useEffect(() => {
        return () => {
          if (locationWatchIdRef.current != null && navigator.geolocation) {
            navigator.geolocation.clearWatch(locationWatchIdRef.current);
          }
        };
      }, []);

      const handleMapClick = (latlng) => {
        if (showPanel && selectedLocation) {
          setSelectedLocation(null);
          setShowPanel(false);
          return;
        }

        setSelectedLocation(null);
        setTempCoords(latlng);
        setIsAddingMode(true);
        setShowPanel(true);
      };

      const handleImageSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onload = (ev) => {
          const img = new Image();
          img.src = ev.target.result;

          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500;
            const scale = MAX_WIDTH / img.width;

            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const previewDataUrl = canvas.toDataURL('image/jpeg', 0.6);

            canvas.toBlob((blob) => {
              if (!blob) return;
              const compressedFile = new File([blob], `${Date.now()}.jpg`, { type: 'image/jpeg' });
              setSelectedImage(previewDataUrl);
              setSelectedFile(compressedFile);
            }, 'image/jpeg', 0.6);
          };
        };
      };

      const handleDelete = async (e) => {
        if (e) {
          e.preventDefault();
          e.nativeEvent.stopImmediatePropagation();
          e.stopPropagation();
        }

        if (!selectedLocation) return;
        if (!confirm('Are you sure you want to delete this memory?')) return;

        const imageUrls = [];
        if (selectedLocation.latestImage) imageUrls.push(selectedLocation.latestImage);

        if (selectedLocation.history && selectedLocation.history.length > 0) {
          selectedLocation.history.forEach((entry) => {
            if (entry.image) imageUrls.push(entry.image);
          });
        }

        const filePaths = [...new Set(imageUrls.map((url) => extractStoragePathFromUrl(url)).filter(Boolean))];

        if (filePaths.length > 0) {
          const { error: storageError } = await sb.storage.from(IMAGE_BUCKET).remove(filePaths);
          if (storageError) {
            console.error('Failed to delete storage files:', storageError);
            alert('Failed to delete storage images: ' + storageError.message);
            return;
          }
        }

        const newMarkers = markers.filter((m) => m.id !== selectedLocation.id);
        setMarkers(newMarkers);
        await saveSharedData(newMarkers);
        setSelectedLocation(null);
        setShowPanel(false);
      };

      const handleSubmit = async (e) => {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }

        if (!comment && !selectedImage && !selectedFile) return;

        if (selectedImage && !selectedFile) {
          alert('Image is still being prepared. Please wait about 1 second and try again.');
          return;
        }

        setIsUploading(true);
        let uploadedImageUrl = null;

        if (selectedFile) {
          uploadedImageUrl = await uploadImageToStorage(selectedFile);
          if (!uploadedImageUrl) {
            setIsUploading(false);
            return;
          }
        }

        const newEntry = {
          comment,
          image: uploadedImageUrl,
          timestamp: new Date().toISOString(),
          author: 'Me',
        };

        let newMarkers = [...markers];

        if (selectedLocation) {
          newMarkers = newMarkers.map((m) => {
            if (m.id === selectedLocation.id) {
              return {
                ...m,
                latestImage: uploadedImageUrl || m.latestImage,
                latestComment: comment || m.latestComment,
                updatedAt: new Date().toISOString(),
                history: [...(m.history || []), newEntry],
              };
            }
            return m;
          });

          setSelectedLocation(null);
        } else if (tempCoords) {
          const newMarker = {
            id: Date.now().toString(),
            lat: tempCoords.lat,
            lng: tempCoords.lng,
            latestImage: uploadedImageUrl,
            latestComment: comment,
            createdAt: new Date().toISOString(),
            history: [newEntry],
          };

          newMarkers.push(newMarker);
          setTempCoords(null);
          setIsAddingMode(false);
        }

        newMarkers = normalizeMarkers(newMarkers);
        setMarkers(newMarkers);
        await saveSharedData(newMarkers);

        setComment('');
        setSelectedImage(null);
        setSelectedFile(null);
        setDraftState(null);
        setShowPanel(false);
        setIsUploading(false);
      };

      const handleExport = () => {
        const dataStr = JSON.stringify(markers);
        navigator.clipboard.writeText(dataStr)
          .then(() => {
            setCopySuccess(true);
            setTimeout(() => setCopySuccess(false), 2000);
          })
          .catch(() => {
            alert('Copy failed. Please select all and copy manually.\n\n' + dataStr);
          });
      };

      const handleImport = async () => {
        try {
          if (!importText) return;
          const parsed = normalizeMarkers(JSON.parse(importText));
          if (!Array.isArray(parsed)) {
            alert('Invalid data format.');
            return;
          }

          if (confirm('Would you like to add this to the existing data? (Cancel = replace all)')) {
            const currentIds = new Set(markers.map((m) => m.id));
            const merged = [...markers];
            parsed.forEach((m) => {
              if (!currentIds.has(m.id)) merged.push(m);
            });
            setMarkers(merged);
            await saveSharedData(merged);
          } else {
            setMarkers(parsed);
            await saveSharedData(parsed);
          }

          setImportText('');
          alert('Import successful! (' + parsed.length + ' pins)');
        } catch (e) {
          alert('Data format error: ' + e.message);
        }
      };

      return (
        <div className="relative w-full h-full font-sans text-gray-800">
          <div id="map-container" ref={mapRef} className="absolute inset-0 z-0"></div>

          <div className="absolute top-4 left-4 right-4 z-10 flex justify-between items-center pointer-events-none ui-layer">
            <div className="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg pointer-events-auto flex items-center gap-2 ui-content">
              <Icons.MapPin size={18} className="text-blue-600" />
              <span className="font-bold text-sm">HM Signs</span>
              <span className="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">
                {markers.length} pins
              </span>
            </div>
          
            <div className="map-action-buttons pointer-events-auto ui-content">
              <button
                onClick={handleLocateMe}
                className="map-action-btn location"
                title="My location"
                aria-label="My location"
              >
                {isLocating ? (
                  <div className="map-action-spinner"></div>
                ) : (
                  <Icons.Locate className="map-action-icon" />
                )}
              </button>

              <button
                onClick={() => setShowSettings(true)}
                className="map-action-btn settings"
                title="Settings"
                aria-label="Settings"
              >
                <Icons.Settings className="map-action-icon" />
              </button>
            </div>
          </div>

          {locationError && (
            <div className="absolute top-20 left-4 right-4 z-20 pointer-events-none ui-layer">
              <div className="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2 rounded-xl shadow">
                {locationError}
              </div>
            </div>
          )}

          {myLocation && !locationError && (
            <div className="absolute top-20 left-4 z-20 pointer-events-none ui-layer">
              <div className="bg-white/90 backdrop-blur-sm text-xs text-gray-600 px-3 py-2 rounded-full shadow">
                Location accuracy: about {Math.round(myLocation.accuracy || 0)}m
              </div>
            </div>
          )}

          {showSettings && (
            <div className="absolute inset-0 bg-black/50 z-[9999] flex items-center justify-center p-4 ui-layer ui-content">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl modal-enter">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-800">Data Sharing / Status</h2>
                  <button onClick={() => setShowSettings(false)} className="p-1 hover:bg-gray-100 rounded-full">
                    <Icons.X size={24} />
                  </button>
                </div>

                <div className="space-y-6">
                  <div className="text-xs text-gray-500 bg-gray-50 rounded-lg p-3 border">
                    Status: {syncMessage}
                  </div>

                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h3 className="font-bold text-blue-800 mb-1 flex items-center gap-2">
                      <Icons.Upload size={18} /> Export (Backup)
                    </h3>
                    <p className="text-xs text-blue-600 mb-3">Copy all current map data as text.</p>

                    <button
                      onClick={handleExport}
                      className={`w-full py-2.5 rounded-lg font-bold text-sm transition flex items-center justify-center gap-2 ${copySuccess ? 'bg-green-500 text-white' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                    >
                      {copySuccess ? (
                        <>
                          <Icons.Check size={16} /> Copied!
                        </>
                      ) : (
                        'Copy data code'
                      )}
                    </button>
                  </div>

                  <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <h3 className="font-bold text-gray-800 mb-1 flex items-center gap-2">
                      <Icons.Download size={18} /> Import
                    </h3>
                    <p className="text-xs text-gray-500 mb-3">Paste your backup code below.</p>

                    <textarea
                      value={importText}
                      onChange={(e) => setImportText(e.target.value)}
                      className="w-full h-20 p-2 border rounded-lg text-xs mb-2 focus:ring-2 focus:ring-blue-500 outline-none"
                      placeholder='[{"id":"170..." ...}]'
                    />

                    <button
                      onClick={handleImport}
                      disabled={!importText}
                      className="w-full bg-gray-800 text-white py-2.5 rounded-lg font-bold text-sm hover:bg-black disabled:bg-gray-300 transition"
                    >
                      Add to map
                    </button>
                  </div>

                  <div className="text-center text-xs text-gray-400">Pin count: {markers.length}</div>
                </div>
              </div>
            </div>
          )}

          {showPanel && (selectedLocation || isAddingMode) && (
            <div
              className="absolute bottom-0 left-0 right-0 sm:top-0 sm:right-0 sm:bottom-0 sm:left-auto sm:w-96 bg-white z-[5000] shadow-2xl sm:border-l border-gray-200 flex flex-col slide-up max-h-[85vh] sm:max-h-screen rounded-t-2xl sm:rounded-none ui-layer ui-content"
              onClick={(e) => e.nativeEvent.stopImmediatePropagation()}
              onMouseDown={(e) => e.nativeEvent.stopImmediatePropagation()}
              onTouchStart={(e) => e.nativeEvent.stopImmediatePropagation()}
            >
              <div className="flex items-center justify-between p-4 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl z-10">
                <h2 className="text-lg font-bold">{isAddingMode ? 'New place' : 'Timeline'}</h2>

                <div className="flex gap-2 items-center">
                  {selectedLocation && !isAddingMode && (
                    <button
                      onClick={handleDelete}
                      className="flex items-center gap-1 px-3 py-1.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition text-sm font-bold shadow-sm border border-red-100 cursor-pointer"
                    >
                      <Icons.Trash size={16} /> Delete
                    </button>
                  )}

                  <button
                    onClick={handleBackToMap}
                    className="px-3 py-1.5 text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition text-sm font-bold shadow-sm border border-blue-100 cursor-pointer"
                  >
                    Back to map
                  </button>

                  <button
                    onClick={handleClosePanel}
                    className="p-2 hover:bg-gray-100 rounded-full cursor-pointer"
                    title="Close and clear"
                    aria-label="Close and clear"
                  >
                    <Icons.X size={20} />
                  </button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                {selectedLocation && (
                  <div className="space-y-6">
                    {selectedLocation.history && selectedLocation.history.length > 0 ? (
                      selectedLocation.history.map((entry, idx) => {
                        const entryDate = new Date(entry.timestamp).toLocaleDateString('en-US', {
                          year: 'numeric',
                          month: 'short',
                          day: 'numeric',
                        });

                        return (
                          <div key={idx} className="relative pl-6 pb-6 border-l-2 border-gray-200 last:border-0 last:pb-0">
                            <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-blue-500 border-2 border-white shadow-sm"></div>

                            <div className="text-xs text-gray-400 mb-1 flex items-center gap-1">
                              <Icons.Clock className="w-3 h-3 shrink-0" />
                              <span>{entryDate}</span>
                            </div>

                            <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                              {entry.image && (
                                <button
                                  type="button"
                                  onClick={() => openLightbox(entry.image, entry.comment, entryDate)}
                                  className="group relative block w-full text-left cursor-zoom-in"
                                >
                                  <img src={entry.image} className="w-full h-48 object-cover" alt="Memory" />
                                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition flex items-center justify-center">
                                    <div className="opacity-0 group-hover:opacity-100 transition bg-white/90 text-gray-800 rounded-full px-3 py-1.5 text-xs font-semibold flex items-center gap-1 shadow">
                                      <Icons.ZoomIn size={14} /> View larger
                                    </div>
                                  </div>
                                </button>
                              )}
                              {entry.comment && <div className="p-3 text-sm text-gray-700">{entry.comment}</div>}
                            </div>
                          </div>
                        );
                      })
                    ) : (
                      <p className="text-center text-gray-400 py-10">No records</p>
                    )}
                  </div>
                )}

                {isAddingMode && <div className="text-center py-10 text-gray-400">Leave a photo and a note.</div>}
              </div>

              <div className="p-4 bg-gray-50 border-t border-gray-200 sticky bottom-0 z-50 bg-white">
                {selectedImage && (
                  <div className="mb-2 relative inline-block group">
                    <button
                      type="button"
                      onClick={() => openLightbox(selectedImage, comment || 'Preview image', 'Preview')}
                      className="block cursor-zoom-in"
                    >
                      <img src={selectedImage} className="h-16 w-auto rounded border" alt="Selected preview" />
                      <div className="absolute inset-0 rounded border bg-black/0 group-hover:bg-black/20 transition flex items-center justify-center">
                        <div className="opacity-0 group-hover:opacity-100 transition bg-white/90 text-gray-800 rounded-full px-2.5 py-1 text-[11px] font-semibold flex items-center gap-1 shadow">
                          <Icons.ZoomIn size={12} /> Enlarge
                        </div>
                      </div>
                    </button>
                    <button
                      onClick={() => {
                        setSelectedImage(null);
                        setSelectedFile(null);
                      }}
                      className="absolute -top-2 -right-2 bg-black text-white rounded-full p-0.5"
                    >
                      <Icons.X size={12} />
                    </button>
                  </div>
                )}

                <div className="flex items-center gap-2 w-full">
                  <label className="shrink-0 w-10 h-10 flex items-center justify-center bg-white text-blue-600 rounded-xl border cursor-pointer hover:bg-blue-50 transition shadow-sm">
                    <Icons.Camera size={20} />
                    <input type="file" accept="image/*" className="hidden" onChange={handleImageSelect} />
                  </label>

                  <input
                    type="text"
                    value={comment}
                    onChange={(e) => setComment(e.target.value)}
                    placeholder="Add a note..."
                    className="flex-1 h-10 pl-3 pr-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm outline-none min-w-0"
                  />

                  <button
                    onClick={handleSubmit}
                    disabled={isUploading}
                    className="shrink-0 w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 disabled:bg-gray-300 transition"
                  >
                    <Icons.Send size={18} />
                  </button>
                </div>
              </div>
            </div>
          )}

          {!showPanel && (selectedLocation || draftState) && (
            <div className="absolute bottom-4 left-4 right-4 z-[7000] flex flex-col sm:flex-row gap-2 pointer-events-none ui-layer">
              <div className="flex flex-col sm:flex-row gap-2 pointer-events-auto ui-content">
                {draftState && (
                  <button
                    type="button"
                    onClick={restoreDraft}
                    className="bg-blue-600 text-white px-4 py-3 rounded-2xl shadow-lg hover:bg-blue-700 transition font-semibold text-sm"
                  >
                    Return to draft
                  </button>
                )}

                {selectedLocation && (
                  <button
                    type="button"
                    onClick={() => setShowPanel(true)}
                    className="bg-white/95 backdrop-blur-sm text-gray-800 px-4 py-3 rounded-2xl shadow-lg hover:bg-gray-100 transition font-semibold text-sm border"
                  >
                    Back to pin
                  </button>
                )}

                <button
                  type="button"
                  onClick={() => {
                    setSelectedLocation(null);
                    setDraftState(null);
                  }}
                  className="bg-white/95 backdrop-blur-sm text-gray-600 px-4 py-3 rounded-2xl shadow-lg hover:bg-gray-100 transition font-semibold text-sm border"
                >
                  Clear hidden screen
                </button>
              </div>
            </div>
          )}

          {lightboxImage && (
            <div
              className="absolute inset-0 z-[12000] bg-black/85 flex items-center justify-center p-4 sm:p-6 ui-content"
              onClick={closeLightbox}
            >
              <div className="relative w-full h-full flex flex-col items-center justify-center" onClick={(e) => e.stopPropagation()}>
                <button
                  type="button"
                  onClick={closeLightbox}
                  className="lightbox-close-btn"
                  aria-label="Close enlarged image"
                  title="Close"
                >
                  <Icons.X className="lightbox-close-icon" />
                </button>

                <img src={lightboxImage} alt="Enlarged view" className="lightbox-image modal-enter" />

                {(lightboxCaption || lightboxDate) && (
                  <div className="mt-4 max-w-3xl w-full bg-white/10 backdrop-blur-sm text-white rounded-2xl px-4 py-3 shadow-lg">
                    {lightboxDate && <div className="text-xs text-white/70 mb-1">{lightboxDate}</div>}
                    {lightboxCaption && <div className="text-sm sm:text-base">{lightboxCaption}</div>}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const reactRoot = ReactDOM.createRoot(document.getElementById('root'));
    reactRoot.render(<MainApp />);
  </script>
</body>
</html>
